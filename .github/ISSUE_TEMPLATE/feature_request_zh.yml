name: 功能请求（中文）
description: 建议新命令、格式边界或流程集成。
title: "feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 这个功能会帮你解决什么实际流程问题？
    validations:
      required: true
  - type: textarea
    id: agat
    attributes:
      label: 对应 AGAT 行为
      description: 如果它对应某个 AGAT 命令或行为，请写在这里。
    validations:
      required: false
  - type: textarea
    id: example
    attributes:
      label: 示例命令
      render: bash
    validations:
      required: false
  - type: textarea
    id: data
    attributes:
      label: 示例数据
      description: 如果涉及格式兼容，请尽量提供最小 GFF/GTF 片段或公开数据链接。
      render: text
    validations:
      required: false
