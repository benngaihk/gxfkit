name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            package: linux-x86_64-static
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            package: linux-aarch64-static
          - os: macos-15-intel
            target: x86_64-apple-darwin
            package: macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            package: macos-aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin gxfkit
      - name: Smoke test release binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          bin="target/${TARGET}/release/gxfkit"
          "$bin" version
          printf '%s\n' \
            '##gff-version 3' \
            'chr1	src	gene	1	100	.	+	.	ID=gene:g1' \
            'chr1	src	mRNA	1	100	.	+	.	ID=transcript:t1;Parent=gene:g1' \
            'chr1	src	exon	1	50	.	+	.	Parent=transcript:t1;exon_id=e1' \
            > smoke.gff3
          "$bin" gff2gtf -g smoke.gff3 -o smoke.gtf
          grep 'gene_id "g1"; transcript_id "t1";' smoke.gtf
      - name: Package archive
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          PACKAGE: ${{ matrix.package }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          name="gxfkit-${RELEASE_TAG}-${PACKAGE}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release/gxfkit" "dist/${name}/gxfkit"
          chmod +x "dist/${name}/gxfkit"
          cp README.md LICENSE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  publish:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
