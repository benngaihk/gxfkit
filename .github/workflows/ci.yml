name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
      - run: cargo build --release

  parity:
    name: parity vs AGAT (gold standard)
    runs-on: ubuntu-latest
    # Correctness regression gate: the benchmark container produces AGAT (gold)
    # and gxfkit GTF, then summarize.py diffs them through the normalizer and
    # fails the build if any file's parity drops below MIN_PARITY.
    steps:
      - uses: actions/checkout@v4
      - name: Download core corpus (parity-guaranteed Ensembl files)
        run: bash corpus/download.sh core
      - name: Build benchmark image
        run: docker build -f benchmark/Dockerfile -t gxfkit-bench .
      - name: Produce AGAT + gxfkit outputs
        run: |
          mkdir -p benchmark/results
          docker run --rm \
            -v "$PWD/corpus/raw:/corpus:ro" \
            -v "$PWD/benchmark/results:/work/results" \
            -e RUNS=1 \
            gxfkit-bench
      - name: Check parity (gate)
        env:
          MIN_PARITY: "98"
        run: python benchmark/summarize.py benchmark/results tests/parity/normalize.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: parity-results
          path: benchmark/results/summary.tsv
