name: Publish Crates.io

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Workspace version to publish, for example 0.0.1"
        required: true
        type: string
      crate:
        description: "Crate publish scope"
        required: true
        type: choice
        default: both
        options:
          - both
          - gxfkit-core
          - gxfkit
      confirm:
        description: "Type 'publish' to publish to Crates.io"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  EXPECTED_VERSION: ${{ inputs.version }}

jobs:
  publish:
    name: publish ${{ inputs.crate }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Confirm publish intent
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "publish" ]; then
            echo "Refusing to publish: confirmation input must be exactly 'publish'."
            exit 1
          fi

      - name: Verify workspace crate versions
        run: |
          set -euo pipefail
          cargo metadata --no-deps --format-version 1 > /tmp/gxfkit-cargo-metadata.json
          python3 - <<'PY'
          import json
          import os

          expected = os.environ["EXPECTED_VERSION"]
          with open("/tmp/gxfkit-cargo-metadata.json", encoding="utf-8") as handle:
              metadata = json.load(handle)
          wanted = {"gxfkit-core", "gxfkit"}
          versions = {
              package["name"]: package["version"]
              for package in metadata["packages"]
              if package["name"] in wanted
          }
          missing = wanted - versions.keys()
          if missing:
              raise SystemExit(f"missing packages in cargo metadata: {sorted(missing)}")
          mismatched = {
              name: version
              for name, version in versions.items()
              if version != expected
          }
          if mismatched:
              raise SystemExit(
                  f"version mismatch: expected {expected}, found {mismatched}"
              )
          PY

      - name: Run publish preflight
        run: |
          set -euo pipefail
          cargo fmt --all --check
          cargo test --all --locked
          cargo package -p gxfkit-core --locked --registry crates-io

      - name: Publish gxfkit-core
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit-core' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p gxfkit-core --locked --registry crates-io

      - name: Wait for gxfkit-core registry visibility
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit' }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if cargo search gxfkit-core --registry crates-io --limit 5 \
              | grep -Eq "^gxfkit-core = \"${EXPECTED_VERSION}\""; then
              exit 0
            fi
            echo "gxfkit-core ${EXPECTED_VERSION} is not visible yet (attempt ${attempt}/30)."
            sleep 20
          done
          echo "Timed out waiting for gxfkit-core ${EXPECTED_VERSION} in crates.io index."
          exit 1

      - name: Publish gxfkit
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p gxfkit --locked --registry crates-io
