name: Publish Crates.io

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Workspace version to publish, for example 0.0.2"
        required: true
        type: string
      crate:
        description: "Crate publish scope"
        required: true
        type: choice
        default: both
        options:
          - both
          - gxfkit-core
          - gxfkit
      source_ref:
        description: "Git ref to publish from; defaults to v<version>"
        required: false
        default: ""
        type: string
      confirm:
        description: "Type 'publish' to publish to Crates.io"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-crates-${{ inputs.version }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  EXPECTED_VERSION: ${{ inputs.version }}
  PUBLISH_REF: ${{ inputs.source_ref || format('v{0}', inputs.version) }}

jobs:
  publish:
    name: publish ${{ inputs.crate }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Verify publish inputs
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          PUBLISH_REF: ${{ env.PUBLISH_REF }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          if ! printf '%s\n' "$EXPECTED_VERSION" | grep -Eq '^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Workspace version must look like X.Y.Z, got: $EXPECTED_VERSION"
            exit 1
          fi
          case "$PUBLISH_REF" in
            "" | *[[:space:]]*)
              echo "Publish ref must be non-empty and contain no whitespace, got: $PUBLISH_REF"
              exit 1
              ;;
          esac
          if [ "$CONFIRM" != "publish" ]; then
            echo "Refusing to publish: confirmation input must be exactly 'publish'."
            exit 1
          fi

      - name: Verify Crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN repository secret is required to publish to Crates.io."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.PUBLISH_REF }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Verify workspace crate versions
        run: |
          set -euo pipefail
          cargo metadata --no-deps --format-version 1 > /tmp/gxfkit-cargo-metadata.json
          python3 - <<'PY'
          import json
          import os

          expected = os.environ["EXPECTED_VERSION"]
          with open("/tmp/gxfkit-cargo-metadata.json", encoding="utf-8") as handle:
              metadata = json.load(handle)
          wanted = {"gxfkit-core", "gxfkit"}
          versions = {
              package["name"]: package["version"]
              for package in metadata["packages"]
              if package["name"] in wanted
          }
          missing = wanted - versions.keys()
          if missing:
              raise SystemExit(f"missing packages in cargo metadata: {sorted(missing)}")
          mismatched = {
              name: version
              for name, version in versions.items()
              if version != expected
          }
          if mismatched:
              raise SystemExit(
                  f"version mismatch: expected {expected}, found {mismatched}"
              )
          PY

      - name: Verify publish ref
        run: |
          set -euo pipefail
          git fetch --tags --force
          VERSION="${EXPECTED_VERSION}" bash scripts/check-publish-ref.sh

      - name: Run publish preflight
        run: |
          set -euo pipefail
          cargo fmt --all --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --all --locked
          cargo build --release --locked --bin gxfkit
          bash scripts/verify-local-cargo-install.sh
          bash scripts/test-local-cargo-install-verifier.sh
          bash scripts/test-crates-install-verifier.sh
          bash scripts/test-crate-metadata.sh
          python3 scripts/check-crate-metadata.py
          bash scripts/test-release-archive-verifier.sh
          bash scripts/test-release-artifacts.sh
          python3 scripts/check-release-artifacts.py
          bash scripts/test-github-release-verifier.sh
          bash scripts/test-github-release-parity.sh
          python3 scripts/check-bioconda-recipe.py
          bash scripts/test-bioconda-recipe.sh
          bash scripts/test-github-source-sha256.sh
          bash scripts/test-bioconda-install-verifier.sh
          bash scripts/test-public-installs-verifier.sh
          bash scripts/test-public-audit-log.sh
          bash scripts/test-shell-syntax.sh
          python3 scripts/test-python-syntax.py
          bash scripts/test-release-check.sh
          python3 scripts/check-release-check.py
          bash scripts/test-release-check-log.sh
          bash scripts/test-repo-hygiene.sh
          bash scripts/test-executable-scripts.sh
          bash scripts/test-public-install-audit-workflow.sh
          bash scripts/test-ci-workflow.sh
          bash scripts/test-release-workflow.sh
          bash scripts/test-publish-crates-workflow.sh
          bash scripts/test-workflow-policy.sh
          python3 scripts/check-workflow-policy.py
          bash scripts/test-publish-ref.sh
          bash scripts/test-benchmark-summarize.sh
          bash scripts/test-benchmark-summary.sh
          python3 scripts/check-benchmark-summary.py
          bash scripts/test-parity-doc.sh
          python3 scripts/check-parity-doc.py
          bash scripts/test-write-residuals.sh
          bash scripts/test-version-consistency.sh
          bash scripts/test-prepare-next-version.sh
          python3 scripts/check-version-consistency.py \
            --scope cargo \
            --expected-version "$EXPECTED_VERSION"
          bash scripts/test-release-status-doc.sh
          python3 scripts/check-release-status-doc.py
          bash scripts/test-install-docs.sh
          python3 scripts/check-install-docs.py
          bash scripts/test-release-doc.sh
          python3 scripts/check-release-doc.py
          bash scripts/test-release-notes.sh
          python3 scripts/check-release-notes.py
          bash scripts/test-release-readiness.sh
          bash scripts/test-release-evidence.sh
          bash scripts/test-maintainer-surfaces.sh
          python3 scripts/check-maintainer-surfaces.py
          bash scripts/test-package-files.sh
          PACKAGE_FILES_ALLOW_DIRTY=0 bash scripts/check-package-files.sh
          cargo package -p gxfkit-core --locked --registry crates-io

      - name: Publish gxfkit-core
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit-core' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p gxfkit-core --locked --registry crates-io

      - name: Wait for gxfkit-core registry visibility
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit-core' || inputs.crate == 'gxfkit' }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if cargo search gxfkit-core --registry crates-io --limit 5 \
              | grep -Eq "^gxfkit-core = \"${EXPECTED_VERSION}\""; then
              exit 0
            fi
            echo "gxfkit-core ${EXPECTED_VERSION} is not visible yet (attempt ${attempt}/30)."
            sleep 20
          done
          echo "Timed out waiting for gxfkit-core ${EXPECTED_VERSION} in crates.io index."
          exit 1

      - name: Package gxfkit
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit' }}
        run: cargo package -p gxfkit --locked --registry crates-io

      - name: Publish gxfkit
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p gxfkit --locked --registry crates-io

      - name: Wait for gxfkit registry visibility
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit' }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if cargo search gxfkit --registry crates-io --limit 5 \
              | grep -Eq "^gxfkit = \"${EXPECTED_VERSION}\""; then
              exit 0
            fi
            echo "gxfkit ${EXPECTED_VERSION} is not visible yet (attempt ${attempt}/30)."
            sleep 20
          done
          echo "Timed out waiting for gxfkit ${EXPECTED_VERSION} in crates.io index."
          exit 1

      - name: Verify Crates.io install
        if: ${{ inputs.crate == 'both' || inputs.crate == 'gxfkit' }}
        run: VERSION="${EXPECTED_VERSION}" bash scripts/verify-crates-install.sh
