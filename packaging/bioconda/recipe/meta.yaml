{% set name = "gxfkit" %}
{% set version = "0.0.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/benngaihk/gxfkit/archive/refs/tags/v{{ version }}.tar.gz
  sha256: b60a0c96f4d70abea6a0a77f26e2fe8092aa4ab913936bb502f2561689c27020

build:
  number: 0

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses

test:
  commands:
    - gxfkit version
    - |
      cat > smoke.gff3 <<'GFF'
      ##gff-version 3
      chr1	src	gene	1	100	.	+	.	ID=gene:g1
      chr1	src	mRNA	1	100	.	+	.	ID=transcript:t1;Parent=gene:g1
      chr1	src	exon	1	50	.	+	.	Parent=transcript:t1;exon_id=e1
      GFF
      gxfkit gff2gtf -g smoke.gff3 -o smoke.gtf
      grep 'gene_id "g1"; transcript_id "t1";' smoke.gtf
      if gxfkit gff2gtf -g smoke.gff3 -o smoke.gtf 2> overwrite.err; then
        echo "gxfkit unexpectedly overwrote smoke.gtf"
        exit 1
      fi
      grep 'refusing to overwrite' overwrite.err

about:
  home: https://github.com/benngaihk/gxfkit
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Fast AGAT-compatible GFF/GTF command-line utilities

extra:
  recipe-maintainers:
    - benngaihk
